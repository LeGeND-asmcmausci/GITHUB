<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090514',
                        purpleAccent: '#B23AEE',
                        blueAccent: '#4D96FF',
                    },
                    fontFamily: {
                        sans: ['sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .bg-gradient-custom {
            background: radial-gradient(circle at top left, #1e0b36 0%, #06020f 60%);
        }

        .neon-text {
            color: #d664ff;
            text-shadow: 0 0 20px rgba(178, 58, 238, 0.6);
        }
    </style>
</head>
<body
    class="bg-darkBg text-white font-sans min-h-screen bg-gradient-custom flex flex-col justify-between overflow-x-hidden">

    <header class="w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center z-10">
        <div class="text-xl font-bold tracking-wider">
            Meta<span class="text-purpleAccent">V</span>
        </div>

        <nav class="hidden md:flex space-x-10 text-sm font-medium text-gray-300">
            <a href="#" class="hover:text-white transition duration-200 text-white">Home</a>
            <a href="#" class="hover:text-white transition duration-200">Resource</a>
            <a href="#" class="hover:text-white transition duration-200">Pricing</a>
            <a href="#" class="hover:text-white transition duration-200">About Us</a>
        </nav>

        <button id="menu-btn" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                </path>
            </svg>
        </button>
    </header>

    <div id="mobile-menu"
        class="hidden md:hidden bg-darkBg/95 border-b border-purple-900/30 px-6 py-4 space-y-3 absolute top-20 left-0 w-full z-20">
        <a href="#" class="block text-gray-300 hover:text-white">Home</a>
        <a href="#" class="block text-gray-300 hover:text-white">Resource</a>
        <a href="#" class="block text-gray-300 hover:text-white">Pricing</a>
        <a href="#" class="block text-gray-300 hover:text-white">About Us</a>
    </div>

    <main
        class="w-full max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center my-auto pt-4 pb-12 relative z-10 gap-12">
        <div class="w-full md:w-1/2 space-y-8 text-center md:text-left">
            <h1
                class="text-4xl sm:text-5xl lg:text-6xl font-extrabold tracking-tight leading-tight max-w-xl mx-auto md:mx-0">
                Explore the future of the <span class="neon-text">Metaverse</span>
            </h1>

            <p class="text-gray-400 text-base sm:text-lg max-w-md mx-auto md:mx-0 font-light leading-relaxed">
                Let's explore and create your experience with metaverse.
            </p>

            <div class="flex flex-col sm:flex-row justify-center md:justify-start gap-4 pt-2">
                <button
                    class="px-8 py-3.5 bg-gradient-to-r from-blue-500 to-purple-600 rounded-md font-semibold shadow-lg shadow-purple-500/20 hover:opacity-90 transition transform hover:-translate-y-0.5 active:translate-y-0">
                    Get Started
                </button>
                <button
                    class="px-8 py-3.5 border border-gray-600 rounded-md font-semibold hover:bg-white/5 transition transform hover:-translate-y-0.5 active:translate-y-0">
                    Explore Now
                </button>
            </div>

            <div
                class="flex justify-center md:justify-start gap-12 pt-8 border-t border-gray-800/60 max-w-md mx-auto md:mx-0">
                <div>
                    <p class="text-2xl sm:text-3xl font-bold tracking-tight">29K+</p>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider">Artworks</p>
                </div>
                <div>
                    <p class="text-2xl sm:text-3xl font-bold tracking-tight">18K+</p>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider">Artists</p>
                </div>
                <div>
                    <p class="text-2xl sm:text-3xl font-bold tracking-tight">25K+</p>
                    <p class="text-xs text-gray-400 mt-1 uppercase tracking-wider">Auction</p>
                </div>
            </div>
        </div>

</body>
</html>
